<header class="fixed top-0 w-full z-50 border-b border-white/5 bg-[#0F0F0F]/60 backdrop-blur-xl">
  <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3">
      <span class="material-symbols-outlined text-4xl text-primary">database</span>
      <span class="text-xl font-medium tracking-[0.2em] text-slate-100">LANDAZURY</span>
    </a>

    <!-- Nav desktop -->
    @if (auth.estaAutenticado()) {
      <nav class="hidden md:flex items-center gap-8">
        <a routerLink="/catalogo" routerLinkActive="text-primary"
           class="text-sm font-medium text-slate-100 hover:text-primary transition-colors">Catálogo</a>
        <a routerLink="/perfil" routerLinkActive="text-primary"
           class="text-sm font-medium text-slate-100 hover:text-primary transition-colors">Mi Perfil</a>
      </nav>
      <div class="hidden md:flex items-center gap-4">
        <button (click)="auth.cerrarSesion()"
                class="px-5 py-2 text-sm font-bold text-slate-100 hover:text-primary transition-colors">
          Salir
        </button>
        <a routerLink="/catalogo"
           class="bg-primary text-[#0F0F0F] px-6 py-2 rounded-lg text-sm font-bold hover:brightness-110 transition-all">
          Ver Catálogo
        </a>
      </div>
    } @else {
      <div class="hidden md:flex items-center gap-4">
        <a routerLink="/auth/login"
           class="px-5 py-2 text-sm font-bold text-slate-100 hover:text-primary transition-colors">
          Ingresar
        </a>
        <a routerLink="/auth/registro"
           class="bg-primary text-[#0F0F0F] px-6 py-2 rounded-lg text-sm font-bold hover:brightness-110 transition-all">
          Únete Ahora
        </a>
      </div>
    }

    <!-- Botón menú móvil -->
    <button class="md:hidden p-2 rounded-lg text-slate-400 hover:text-white transition-colors"
            (click)="toggleMenu()" aria-label="Menú">
      @if (menuAbierto()) {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      } @else {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      }
    </button>
  </div>

  <!-- Menú móvil -->
  @if (menuAbierto()) {
    <div class="md:hidden border-t border-white/5 bg-[#1A1A1A]/90 backdrop-blur-xl px-6 py-4 space-y-3">
      @if (auth.estaAutenticado()) {
        <a routerLink="/catalogo" (click)="toggleMenu()"
           class="block py-2 text-slate-300 hover:text-primary font-medium">Catálogo</a>
        <a routerLink="/perfil" (click)="toggleMenu()"
           class="block py-2 text-slate-300 hover:text-primary font-medium">Mi Perfil</a>
        <button (click)="auth.cerrarSesion()"
                class="block py-2 text-slate-400 hover:text-red-400 font-medium w-full text-left">Cerrar sesión</button>
      } @else {
        <a routerLink="/auth/login" (click)="toggleMenu()"
           class="block py-2 text-slate-300 hover:text-primary font-medium">Ingresar</a>
        <a routerLink="/auth/registro" (click)="toggleMenu()"
           class="block py-2 text-primary font-semibold">Únete Ahora</a>
      }
    </div>
  }
</header>
